name: Update filtered feed

on:
  schedule:
    # Каждые 6 часов (UTC). Фид ~18 МБ — деплоим через Pages-артефакт, БЕЗ коммита
    # в git (иначе история пухнет на 18 МБ за прогон). Resale-кроссовкам 4×/день хватает.
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

# Права для deploy-pages (артефактный деплой, не коммит в ветку).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build filtered feed (скачать 130 МБ → схлоп → docs/feed.xml ~18 МБ)
        run: python scripts/filter_feed.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (папка docs с feed.xml)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
